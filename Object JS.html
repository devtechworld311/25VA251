<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>[]
    <script>
        let myInfo={
            name:"Dev chaudhary",
            age:18,
            isMarried:false,
            address:{
                streetNo:5,
                area:"Bulandshahr",
                pincode:203001,
                city:"BSR",
            },
            course:"Btech",
            branch:"CSE",
            year:2025,
            education:function(){
                console.log("my education is" + myInfo.course + myInfo.branch + "and" + myInfo.year);
            },
        }
        console.log(myInfo.education);
        console.log(myInfo.address.city)  // acess using dot notation 
        console.log(myInfo["name"]); // access bracket notation

        //find object length
        let keys=Object.keys(myInfo);
        console.log(keys.length);

        //delete object property
        console.log(delete myInfo.name);
        console.log(myInfo);

        //print objects property using for loop

        for( let i=0;i<keys.length;i++){
            console.log("objects keys are " + myInfo[keys[i]]);
        }

        //print objects property using for in loop

        for( let x in myInfo){
            console.log(myInfo[x]);
        }

        //Create object using new keywords
        let student = new Object();
        student.name="Dev chaudhary";
        student.age=18;
        student.course="Btech";
        student.address="BSR";
        student.isMarried=false;

        console.log(student.name);

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //loops : used to repeatedly run a blocck of code until a specific condition is met.
        
        //For loop : used when you know the number of iterations in advance
        let studentList=["Vinay","Vikas","Abhi","Megha","Vivek","Deepak"];

        for (let i=0; i<studentList.length; i++){
            console.log(studentList[i]);
        }

        //While loop...........
        let x=0;
        while(x>studentList.length){
            console.log(studentList[x]);
            x++;
        }

        //for......of : Iterations over the value of iterable objects (like Arrays, Strings ,Maps , and Sets)
        for ( let y of studentList){
            console.log(y); 
        };
    </script>
</body>
</html>

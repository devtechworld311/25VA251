        }

        //with parameters
        function cal(a,b){
            var num1=a;
            var num2=b;
            console.log("Addition of two number is " + (num1+num2));
        }
        cal(3,5)
        // with default para

        
        function add(a,b=5){
            var num1=a;
            var num2=b;
            var res1=num1+num2;
            console.log("Addition is " + res1);
        }

        function mul(a,b=8){
            var num1=a;
            var num2=b;
            var res2=num1*num2;
            console.log("Multiplication is" + res2);
        }

        function div(a,b=6){
            var num1=a;
            var num2=b;
            var res3=num1/num2;
            console.log("Division is " + res3);
        }

        add(10,23);
        div(30);

       // Call back function :
       // call back in synchronous
       function addRes(callback){
        var num1=5;
        var num2=10;
        var res=num1+num2;
        callback(res)
       }
       function result(res){
        console.log("Additon of two number is " + res);

<!DOCTYPE html>
<html>
<head>
    <title>Order Form</title>
</head>
<body>

<h2>Product Order Form</h2>

<form onsubmit="return calculateBill()">
    Name:
    <input type="text" id="name" required><br><br>

    Product:
    <select id="product">
        <option value="500">Headphones - ₹500</option>
        <option value="1000">Keyboard - ₹1000</option>
        <option value="2000">Monitor - ₹2000</option>
    </select><br><br>

    Quantity:
    <input type="number" id="qty" min="1" required><br><br>

    <input type="submit" value="Place Order">
</form>

<h3 id="result"></h3>

<script>
function calculateBill() {
    let name = document.getElementById("name").value;
    let price = document.getElementById("product").value;
    let qty = document.getElementById("qty").value;

    let total = price * qty;

    document.getElementById("result").innerHTML =
        "Thank You " + name +
        "! Your Total Bill is ₹" + total;

    return false; // page reload nahi hoga
}
</script>

</body>
</html>
